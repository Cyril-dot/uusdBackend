server.port=${PORT:8080}

spring.application.name=ussd-data-backend

bigdreams.api.base-url=${BIGDREAMS_BASE_URL:https://qrzjkrkawcdoaggblvjc.supabase.co/functions/v1/developer-api}
bigdreams.api.api-key=${BIGDREAMS_API_KEY:bh_live_your_api_key_here}

ussd.session.timeout-minutes=${USSD_SESSION_TIMEOUT_MINUTES:5}
ussd.session.max-menu-items=9

# Paystack collects payment from the CUSTOMER into the business's own Paystack
# account. This is separate from the Big Dreams Data wallet above - the owner
# tops that wallet up themselves, as before.
paystack.secret-key=${PAYSTACK_SECRET_KEY:sk_test_your_secret_key_here}
paystack.base-url=${PAYSTACK_BASE_URL:https://api.paystack.co}

# Optional: confirmation SMS sent once a payment webhook resolves an order.
# Leave arkesel.sms.api-key blank to disable SMS sending entirely.
arkesel.sms.api-key=${ARKESEL_SMS_API_KEY:}
arkesel.sms.sender-id=${ARKESEL_SMS_SENDER_ID:DataBundle}
arkesel.sms.base-url=${ARKESEL_SMS_BASE_URL:https://sms.arkesel.com/api/v2}

logging.level.root=INFO
logging.level.com.bigdreams.ussd=DEBUG
